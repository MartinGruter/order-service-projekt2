spring.application.name=order-service-projekt2
product-service.base-url=${PRODUCT_SERVICE_BASE_URL:http://localhost:8081}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_SERVER_BASE_URL:http://localhost:8080}/auth/jwks
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
jwt-public-key=${JWT_PUBLIC_URL}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
server.forward-headers-strategy=framework
# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST}
spring.rabbitmq.ssl.enabled=true