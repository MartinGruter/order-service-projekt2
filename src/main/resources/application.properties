spring.application.name=order-service-projekt2
server.port=8080
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_SERVER_BASE_URL:http://localhost:8080}/auth/jwks
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
#
jwt-public-key=${JWT_PUBLIC_URL:http://localhost:8080/auth/jwks}
product-service-base-url=${PRODUCT_SERVICE_URL:http://localhost:8081}
#
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
server.forward-headers-strategy=framework
# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}
spring.rabbitmq.ssl.enabled=true
#
rabbitmq.order-confirmation-queue=${RABBITMQ_ORDER_CONFIRMATION_QUEUE:order-confirmation-queue}